<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>数据迁移 — 御笔易学</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
  pre { background: #f5f5f5; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
  button { padding: 10px 24px; font-size: 15px; background: #007AFF; color: white; border: none; border-radius: 8px; cursor: pointer; }
  button:disabled { opacity: 0.4; }
  .ok { color: #34C759; }
  .warn { color: #FF9500; }
</style>
</head>
<body>
<h1>数据迁移</h1>
<p>将浏览器 IndexedDB 的历史记录迁移到服务端 SQLite 数据库，归管理员 <code>cyh20101224@126.com</code> 所有。</p>

<button id="btn" onclick="run()">开始迁移</button>
<pre id="log">等待开始...</pre>

<script>
const LOG = document.getElementById('log');
const BTN = document.getElementById('btn');

function log(msg) { LOG.textContent += '\n' + msg; LOG.scrollTop = LOG.scrollHeight; }

const DB_NAMES = ['yubi-panguan','yubi-yixue','yubi-yixue-db','yubi_yixue','yubi-panguan-db','yubi-panguan-local','yubi-panguan-storage'];

function openDB(name) {
  return new Promise((resolve, reject) => {
    const r = indexedDB.open(name);
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
    r.onblocked = () => reject(new Error('blocked: ' + name));
  });
}

function readAll(db, storeName) {
  if (!db.objectStoreNames.contains(storeName)) return Promise.resolve([]);
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const rows = [];
    const r = tx.objectStore(storeName).openCursor();
    r.onsuccess = () => { if (r.result) { rows.push(r.result.value); r.result.continue(); } else resolve(rows); };
    r.onerror = () => reject(r.error);
  });
}

function isPerson(obj) {
  return obj && typeof obj === 'object' && typeof obj.name === 'string' && typeof obj.birthYear === 'number';
}

async function run() {
  BTN.disabled = true;
  LOG.textContent = '正在扫描 IndexedDB...';

  const allBazi = [];
  const allDiv = [];
  const allCompat = [];

  for (const name of DB_NAMES) {
    try {
      const db = await openDB(name);
      log(`  ✓ 打开 ${name}`);

      // Bazi records
      const recs = await readAll(db, 'records');
      for (const raw of recs) {
        const person = raw?.person || raw?.personInfo || raw?.personData || raw?.person_data || raw;
        if (isPerson(person)) {
          allBazi.push({
            id: raw.id, person, resultData: raw.resultData || raw.result_data || null,
            label: raw.label || `${person.name} · ${person.birthYear}年`, createdAt: raw.createdAt || Date.now()
          });
        }
      }

      // Divination
      const divs = await readAll(db, 'divination_records');
      for (const raw of divs) {
        if (raw.type === 'liuyao' || raw.type === 'meihua') {
          allDiv.push({ id: raw.id, type: raw.type, method: raw.method, question: raw.question, hexagramData: raw.hexagramData || raw.hexagram_data, aiInterpretation: raw.aiInterpretation || raw.ai_interpretation, label: raw.label, createdAt: raw.createdAt });
        }
      }

      // Compat
      const comps = await readAll(db, 'compat_records');
      for (const raw of comps) {
        if (raw.malePerson && raw.femalePerson) {
          allCompat.push({ id: raw.id, malePerson: raw.malePerson, femalePerson: raw.femalePerson, result: raw.result || raw.resultData, aiInsight: raw.aiInsight || raw.ai_insight, label: raw.label, createdAt: raw.createdAt });
        }
      }

      db.close();
    } catch (e) {
      log(`  ✗ 跳过 ${name}: ${e.message}`);
    }
  }

  log(`\n扫描完成: 八字${allBazi.length}条 | 算卦${allDiv.length}条 | 合盘${allCompat.length}条`);

  if (allBazi.length === 0 && allDiv.length === 0 && allCompat.length === 0) {
    log('没有可迁移的数据，结束。');
    BTN.disabled = false;
    return;
  }

  log('\n正在上传到服务端...');
  try {
    const res = await fetch('/api/migrate/import', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ baziRecords: allBazi, divinationRecords: allDiv, compatRecords: allCompat, adminPassword: 'yubi-migrate-2024' }),
    });
    const data = await res.json();
    if (data.success) {
      log(`\n✓ 迁移成功！`);
      log(`  八字导入: ${data.imported.bazi} 条`);
      log(`  算卦导入: ${data.imported.divination} 条`);
      log(`  合盘导入: ${data.imported.compat} 条`);
      log(`  跳过重复: ${data.imported.skipped} 条`);
    } else {
      log(`\n✗ 服务端返回错误: ${data.error}`);
    }
  } catch (e) {
    log(`\n✗ 上传失败: ${e.message}`);
  }

  BTN.disabled = false;
}
</script>
</body>
</html>
